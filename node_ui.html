<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
<link rel="stylesheet" href="node_style.css">
</head>

<body>

<div class="container mt-4">
    
    <div class="top-section">

        <!-- header -->
        <div class="d-flex justify-content-between align-items-center">

            <h2>My Notes</h2>

            <button id="themeToggle" class="icon-btn">
                <i class="bi bi-sun-fill"></i>
            </button>

            <button class="btn btn-success new-note-btn">
                + New Note
            </button>

        </div>

        <!-- search -->
        <input type="text"
               placeholder="Search..."
               class="form-control mt-3 searchnote">

        <!-- filter + sort -->
        <div class="d-flex gap-2 mt-3">

            <select id="filterCategory" class="form-select">
                <option value="all">All</option>
                <option value="personal">Personal</option>
                <option value="study">Study</option>
                <option value="work">Work</option>
                <option value="ideas">Ideas</option>
            </select>

            <select id="sortNotes" class="form-select">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="az">A-Z</option>
            </select>

            <button class="trashBtn">
                <i class="bi bi-trash3"></i>
            </button>
        </div>

    </div>

    <!-- notes -->
    <div class="row mt-3 shownotegroup"></div>

    <!-- empty -->
    <div class="text-center mt-5 ifnonote"></div>

</div>

<!-- popup -->
<div class="popup hidden" id="notePopup">
    <div class="popup-box">
        <h3>Note</h3>

        <input type="text"
               id="noteTitle"
               placeholder="Title"
               class="form-control mb-2">

        <textarea id="noteContent"
                  placeholder="Content"
                  class="form-control mb-2"></textarea>

        <select id="noteCategory" class="form-select mb-3">
            <option value="personal">Personal</option>
            <option value="study">Study</option>
            <option value="work">Work</option>
            <option value="ideas">Ideas</option>
        </select>

        <div class="text-end">
            <button class="btn btn-secondary cancelBtn">Cancel</button>
            <button class="btn btn-success saveBtn">Save</button>
        </div>
    </div>
</div>

<script src="node_ux.js"></script>
</body>
</html>
